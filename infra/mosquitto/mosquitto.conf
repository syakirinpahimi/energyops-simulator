# Mosquitto MQTT broker config for the EnergyOps demo.
#
# Ports:
#   1883 - native MQTT (used by simulator + backend)
#   9001 - MQTT over WebSockets (handy for browser-side debugging)
#
# Anonymous access is enabled because this is a single-machine demo.
# For anything beyond a portfolio demo, set `allow_anonymous false` and
# add a password file via `password_file /mosquitto/config/passwd`.

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

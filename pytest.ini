[pytest]
# Repo-root pytest config.
#
# - asyncio_mode=auto: tests don't need @pytest.mark.asyncio on every coroutine.
# - asyncio_default_fixture_loop_scope=function: silences the pytest-asyncio
#   "fixture loop scope is unset, this will default to function" deprecation
#   warning by pinning the documented default explicitly. We do NOT add a
#   blanket filterwarnings ignore so real project warnings still surface.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
